name: Refresh stations

on:
  schedule:
    # Weekly, Mondays at 10:00 UTC (03:00 PT).
    - cron: "0 10 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh station URLs
        run: python3 scripts/refresh-stations.py

      - name: Commit changes if any
        run: |
          if git diff --quiet BayWave/BayWave/Resources/stations.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "baywave-bot"
          git config user.email "baywave-bot@users.noreply.github.com"
          git add BayWave/BayWave/Resources/stations.json
          git commit -m "chore(stations): refresh dead URLs $(date -u +%Y-%m-%d)"
          git push
